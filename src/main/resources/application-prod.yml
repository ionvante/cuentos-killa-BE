# ══════════════════════════════════════════════════════
#  Perfil de Producción — Railway
#  Las variables ${...} se configuran en Railway → Variables
# ══════════════════════════════════════════════════════

server:
  port: ${PORT:8080}

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    hikari:
      maximum-pool-size: 5       # Railway free: recursos limitados
      minimum-idle: 1
      connection-timeout: 20000
      idle-timeout: 300000
      data-source-properties:
        prepareThreshold: 0      # Evita problema con Supabase/Railway Pooler

  jpa:
    hibernate:
      ddl-auto: validate         # Flyway maneja el esquema, Hibernate solo valida
    show-sql: false              # Desactivado en prod para no llenar los logs

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${SPRING_MAIL_USERNAME}
    password: ${SPRING_MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

cors:
  allowed-origins:
    - ${CORS_ALLOWED_ORIGINS:https://killacuentos.web.app}
  allowed-methods: GET,POST,PUT,DELETE,OPTIONS
  allowed-headers: "*"
  allow-credentials: true

firebase:
  bucket: ${FIREBASE_BUCKET}
  # Las credenciales se leen desde FIREBASE_CREDENTIALS_JSON (variable inline)
  # o desde el archivo indicado en firebase.credentials (desarrollo local)

mercadopago:
  access-token: ${MERCADOPAGO_ACCESS_TOKEN}
  back-urls:
    success: ${FRONTEND_URL:https://killacuentos.web.app}/payment/success
    failure: ${FRONTEND_URL:https://killacuentos.web.app}/payment/failure
    pending: ${FRONTEND_URL:https://killacuentos.web.app}/payment/pending
  notification-url: ${BACKEND_URL}/api/webhooks/mercadopago

jwt:
  secret: ${JWT_SECRET}

sentry:
  dsn: ${SENTRY_DSN:}
  send-default-pii: false        # No enviar datos personales a Sentry en prod
  environment: production

# Actuator: exponer solo health para el health check de Railway
management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never
